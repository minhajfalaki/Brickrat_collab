<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Building Walkthrough</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #B8CEDD; }

    /* ── Shared overlay base ───────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    /* ── Loading screen ────────────────────────────────────────── */
    #loadingOverlay {
      background: #ffffff;
    }

    .logo-container {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .progress-ring {
      position: absolute;
      inset: 0;
      transform: rotate(-90deg);
    }

    .progress-ring__circle {
      fill: transparent;
      stroke: #3498db;
      stroke-width: 8;
      stroke-dasharray: 314;
      stroke-dashoffset: 314;
      transition: stroke-dashoffset 0.3s ease;
    }

    .logo {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 80px;
      height: 80px;
      transform: translate(-50%, -50%);
    }

    #progressText {
      margin-top: 14px;
      font-family: sans-serif;
      font-size: 20px;
      color: #3498db;
    }

    /* ── Click-to-explore prompt ───────────────────────────────── */
    #clickPrompt {
      display: none;          /* shown by JS after load */
      cursor: pointer;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    .prompt-box {
      text-align: center;
      color: #fff;
      font-family: sans-serif;
      padding: 36px 48px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
    }

    .prompt-box h2 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: 0.02em;
    }

    .prompt-box p {
      font-size: 15px;
      line-height: 1.7;
      color: rgba(255,255,255,0.8);
    }

    .prompt-box kbd {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(255,255,255,0.18);
      font-family: monospace;
      font-size: 13px;
    }

    /* ── Crosshair ─────────────────────────────────────────────── */
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      display: none;  /* shown when pointer is locked */
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255, 255, 255, 0.75);
    }

    #crosshair::before {
      width: 14px;
      height: 2px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #crosshair::after {
      width: 2px;
      height: 14px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* ── Esc hint (shown when locked) ──────────────────────────── */
    #escHint {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      pointer-events: none;
    }

    /* ── Mobile / desktop prompt switching ─────────────────────── */
    .mobile-only  { display: none; }
    .desktop-only { display: block; }
    @media (pointer: coarse) {
      .mobile-only  { display: block; }
      .desktop-only { display: none;  }
    }

    /* ── Virtual joystick ──────────────────────────────────────── */
    #joystick-base {
      display: none;          /* shown in JS when touch starts */
      position: fixed;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      border: 2px solid rgba(255, 255, 255, 0.35);
      pointer-events: none;   /* visuals only — canvas handles touch */
      z-index: 200;
    }

    #joystick-knob {
      position: absolute;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.55);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* ── Fullscreen button ─────────────────────────────────────── */
    #btnFullscreen {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      padding: 0;
      touch-action: manipulation;
    }

    #btnFullscreen svg {
      width: 22px;
      height: 22px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #btnFullscreen .fs-compress { display: none; }

    /* ── Prevent browser scroll/zoom on the canvas ─────────────── */
    canvas { touch-action: none; }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="loadingOverlay" class="overlay">
    <div class="logo-container">
      <svg class="progress-ring" width="120" height="120">
        <circle class="progress-ring__circle" r="50" cx="60" cy="60"></circle>
      </svg>
      <img class="logo" src="images/logo_round.png" alt="Logo">
    </div>
    <div id="progressText">0%</div>
  </div>

  <!-- Click-to-explore prompt (shown after model loads) -->
  <div id="clickPrompt" class="overlay">
    <div class="prompt-box">
      <h2>Ready to Explore</h2>

      <!-- Desktop instructions -->
      <p class="desktop-only">Click anywhere to start the walkthrough</p>
      <br class="desktop-only">
      <p class="desktop-only">
        <kbd>W A S D</kbd> or <kbd>↑ ← ↓ →</kbd> &nbsp;Move
        &nbsp;&nbsp;|&nbsp;&nbsp;
        Mouse &nbsp;Look
        &nbsp;&nbsp;|&nbsp;&nbsp;
        <kbd>Esc</kbd> &nbsp;Release cursor
      </p>

      <!-- Mobile instructions -->
      <p class="mobile-only">Tap anywhere to start the walkthrough</p>
      <br class="mobile-only">
      <p class="mobile-only" style="color:rgba(255,255,255,0.75);font-size:14px;line-height:1.7;">
        Left side &nbsp;&#8594;&nbsp; Move &nbsp;&nbsp;|&nbsp;&nbsp; Right side &nbsp;&#8594;&nbsp; Look
      </p>
    </div>
  </div>

  <!-- Crosshair (visible only while pointer is locked) -->
  <div id="crosshair"></div>

  <!-- Esc hint -->
  <div id="escHint">Press Esc to release cursor</div>

  <!-- Virtual joystick (mobile only — shown/hidden by MobileControls.js) -->
  <div id="joystick-base">
    <div id="joystick-knob"></div>
  </div>

  <!-- Fullscreen toggle button -->
  <button id="btnFullscreen" title="Toggle fullscreen" aria-label="Toggle fullscreen">
    <!-- Expand icon (default) -->
    <svg class="fs-expand" viewBox="0 0 24 24">
      <path d="M8 3H5a2 2 0 00-2 2v3"/>
      <path d="M21 8V5a2 2 0 00-2-2h-3"/>
      <path d="M3 16v3a2 2 0 002 2h3"/>
      <path d="M16 21h3a2 2 0 002-2v-3"/>
    </svg>
    <!-- Compress icon (shown when fullscreen) -->
    <svg class="fs-compress" viewBox="0 0 24 24">
      <path d="M8 3v5H3"/>
      <path d="M21 8h-5V3"/>
      <path d="M3 16h5v5"/>
      <path d="M16 21v-5h5"/>
    </svg>
  </button>

  <script type="module" src="main.js"></script>

  <!-- Show / hide crosshair and hint based on pointer lock -->
  <script>
    const crosshair = document.getElementById('crosshair');
    const escHint   = document.getElementById('escHint');
    document.addEventListener('pointerlockchange', () => {
      const locked = !!document.pointerLockElement;
      crosshair.style.display = locked ? 'block' : 'none';
      escHint.style.display   = locked ? 'block' : 'none';
    });
  </script>

</body>
</html>
